# =============================================================================
# HexForge Companion — Windows Release Build (GitHub Actions)
# =============================================================================
# Builds the Windows .exe + NSIS installer on a native Windows runner.
# Trigger: push a tag v*.*.* or manual dispatch from Actions tab.

name: "release"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows NSIS + MSI)
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: hexforge-v__VERSION__
          releaseName: "HexForge Companion v__VERSION__"
          releaseBody: |
            ## HexForge Companion v__VERSION__

            ### Downloads
            - **Windows**: `HexForge-Companion_*_x64-setup.exe`
            - **Windows**: `HexForge-Companion_*_x64_en-US.msi`
            - **Linux (ARM64)**: Download from the [landing page](https://github.com/fyosua/HexForge-Companion#download) or build from source

            ### Quick Start
            1. Download the .exe installer
            2. Run it — WebView2 is auto-installed if needed
            3. No API key needed — works in Mock mode immediately
          releaseDraft: true
          prerelease: false
          args: "--bundles nsis,msi --target x86_64-pc-windows-msvc"
