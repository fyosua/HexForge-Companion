# =============================================================================
# HexForge Companion — Cross-Platform Tauri v2 Build & Release Workflow
# =============================================================================
# Triggers: push to 'release' branch + manual workflow_dispatch
on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{
              matrix.platform == 'macos-latest'
              && 'aarch64-apple-darwin,x86_64-apple-darwin'
              || ''
            }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: hexforge-v__VERSION__
          releaseName: "HexForge Companion v__VERSION__"
          releaseBody: |
            ## HexForge Companion v__VERSION__
            See the assets below to download and install this release.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
